<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />

		<link rel="stylesheet" href="css/style.min.css" />
		<title>ESL Pro League CSGO</title>
	</head>
	<body>
		<section class="header">
			<div class="container">
				<div class="header__top">
					<nav class="header__nav">
						<ul class="header__nav-list">
							<li class="header__nav-item header__nav-item--logo">
								<a href="#">
									<img src="img/logo.png" alt="ESL Pro League logo" />
								</a>
							</li>

							<li class="header__nav-item">
								<a href="https://www.twitter.com/" class="header__nav-link">
									<img src="img/twitter.png" alt="Twitter icon" />
								</a>
							</li>

							<li class="header__nav-item">
								<a href="https://www.twitch.tv/" class="header__nav-link">
									<img src="img/twitch.png" alt="Twitch icon" />
								</a>
							</li>

							<li class="header__nav-item">
								<a href="https://www.facebook.com/" class="header__nav-link">
									<img src="img/facebook.png" alt="Facebook icon" />
								</a>
							</li>
						</ul>

						<hr class="header__underline" />
					</nav>
				</div>

				<div class="header__bottom">
					<div class="header__information">
						<img
							class="header__img"
							src="img/PlayerUnknown's.png"
							alt="PlayerUnknown's Battlegrounds title"
						/>

						<h1 class="header__title">ESL Pro League CSGO</h1>
						<p class="header__text">
							League CS:GO is the new online league in Counter-Strike: Global
							Offensive, with $100,000 total prize pool. 16 teams from Europe
							and the CIS will take part in the League, with 4 teams going to
							League through open qualifiers.
						</p>
					</div>

					<div class="header__buttons">
						<a href="#" class="header__btn header__btn--active">
							read announcement
						</a>

						<a href="#" class="header__btn">get tickets</a>
					</div>
				</div>
			</div>
		</section>
	</body>
	<script src="js/main.js"></script>
</html>
